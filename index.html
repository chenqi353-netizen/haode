<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声音分贝测试 · 早读 / 自习 / 高级模式</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --card: #ffffff;
            --text: #3d3226;
            --sub: #8b7e6a;
            --morning: #e8b86d;
            --morning-light: #fef9f0;
            --study: #7b9e87;
            --study-light: #f2f7f4;
            --advanced: #b59b7e;
            --advanced-light: #f3efe8;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --radius: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(160deg, #f7f3ec, #ede4d8);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            padding: 20px;
        }

        .app {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            text-align: center;
        }
        .header h1 {
            font-size: 1.6rem;
            color: var(--text);
            font-weight: 700;
            margin-bottom: 2px;
        }
        .header p {
            font-size: 0.85rem;
            color: var(--sub);
            letter-spacing: 0.03em;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1.5px solid transparent;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
        }
        .card.morning:hover { border-color: var(--morning); }
        .card.study:hover { border-color: var(--study); }
        .card.advanced:hover { border-color: var(--advanced); }

        .card .icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }
        .card.morning .icon { background: var(--morning-light); }
        .card.study .icon { background: var(--study-light); }
        .card.advanced .icon { background: var(--advanced-light); }

        .card .info h3 {
            font-size: 1.15rem;
            color: var(--text);
            font-weight: 600;
            margin-bottom: 2px;
        }
        .card .info span {
            font-size: 0.8rem;
            color: var(--sub);
        }
        .card .arrow {
            margin-left: auto;
            color: #b8ad9a;
            font-size: 1.2rem;
        }

        /* ========== 计量面板 (早读/自习) ========== */
        .meter-panel, .advanced-setup, .advanced-play {
            display: none;
            flex-direction: column;
            align-items: center;
            background: var(--card);
            border-radius: 20px;
            padding: 24px 20px 20px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.12);
            animation: fadeUp 0.3s ease;
        }
        .meter-panel.active, .advanced-setup.active, .advanced-play.active {
            display: flex;
        }
        .cards.hidden, .header.hidden {
            display: none;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            align-self: flex-start;
            background: none;
            border: none;
            color: var(--sub);
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .back-btn:hover { color: var(--text); }

        .mode-tag {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            padding: 4px 14px;
            border-radius: 30px;
        }
        .mode-tag.morning { background: var(--morning-light); color: #b07d2e; }
        .mode-tag.study { background: var(--study-light); color: #4b7257; }
        .mode-tag.advanced { background: var(--advanced-light); color: #6b5d4f; }

        .db-display {
            font-size: 5.5rem;
            font-weight: 700;
            color: var(--text);
            font-family: 'SF Mono', 'JetBrains Mono', Consolas, monospace;
            line-height: 1;
            letter-spacing: -0.02em;
            margin: 8px 0;
        }
        .db-unit {
            font-size: 1.4rem;
            font-weight: 500;
            color: #a3947e;
            margin-left: 4px;
        }

        .meter-bar {
            width: 100%;
            height: 10px;
            background: #e8e0d4;
            border-radius: 10px;
            overflow: hidden;
            margin: 12px 0 6px;
        }
        .meter-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.08s linear;
            background: #b8a58c;
        }

        .status-text {
            font-size: 0.9rem;
            font-weight: 500;
            margin: 4px 0 16px;
            color: var(--sub);
        }
        .threshold-hint {
            font-size: 0.75rem;
            color: #ab9e89;
            background: #faf8f4;
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        .mic-btn {
            background: var(--text);
            color: #faf7f2;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 14px rgba(61,50,38,0.25);
        }
        .mic-btn:hover { background: #504336; }
        .mic-btn:active { transform: scale(0.96); }
        .mic-btn.off {
            background: #c4b8a8;
            box-shadow: none;
        }
        .error-msg {
            color: #c5664a;
            font-size: 0.8rem;
            margin-top: 8px;
            text-align: center;
        }

        /* ========== 高级模式设置 ========== */
        .setting-group {
            width: 100%;
            margin: 10px 0;
        }
        .setting-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .slider-row input[type=range] {
            flex: 1;
        }
        .slider-row span {
            font-size: 0.8rem;
            color: var(--sub);
            min-width: 50px;
            text-align: right;
        }
        .theme-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .theme-btn {
            border: 2px solid #ddd6cc;
            background: #fff;
            border-radius: 12px;
            padding: 8px 14px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .theme-btn.active {
            border-color: var(--text);
            background: #f4efe8;
        }
        .theme-btn:hover { border-color: #aaa; }
        .setup-start-btn {
            background: var(--text);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 12px;
            cursor: pointer;
            width: 100%;
        }

        /* ========== 高级播放视图 ========== */
        .canvas-wrap {
            width: 100%;
            height: 220px;
            margin: 10px 0;
            background: #fcf9f4;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .timer-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 0.9rem;
            color: var(--sub);
            margin: 4px 0;
        }
        .timer-big {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            font-family: 'SF Mono', monospace;
        }
        .controls-row {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            margin-top: 8px;
        }
        .control-btn {
            border: 1.5px solid #ccc;
            background: white;
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .control-btn:hover { background: #f5f2eb; }
        .control-btn.primary {
            background: var(--text);
            color: white;
            border: none;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- 标题区 -->
    <div class="header" id="headerView">
        <h1>请选择模式</h1>
        <p>实时检测朗读 / 自习音量</p>
    </div>

    <!-- 模式选择卡 -->
    <div class="cards" id="modeCards">
        <div class="card morning" data-mode="morning">
            <div class="icon">🌅</div>
            <div class="info">
                <h3>早读模式</h3>
                <span>目标 50-70 dB · 晨间朗读</span>
            </div>
            <div class="arrow">→</div>
        </div>
        <div class="card study" data-mode="study">
            <div class="icon">📚</div>
            <div class="info">
                <h3>自习模式</h3>
                <span>目标 30-50 dB · 安静学习</span>
            </div>
            <div class="arrow">→</div>
        </div>
        <div class="card advanced" data-mode="advanced">
            <div class="icon">⚙️</div>
            <div class="info">
                <h3>高级模式</h3>
                <span>自定义阈值、时长、动态图画</span>
            </div>
            <div class="arrow">→</div>
        </div>
    </div>

    <!-- ========== 早读/自习 分贝面板 ========== -->
    <div class="meter-panel" id="meterPanel">
        <button class="back-btn" id="btnBackMeter">← 返回选择</button>
        <span class="mode-tag" id="modeTag">早读模式</span>
        <div style="display:flex; align-items: baseline;">
            <span class="db-display" id="dbValue">--</span>
            <span class="db-unit">dB</span>
        </div>
        <div class="meter-bar">
            <div class="meter-fill" id="meterFill" style="width: 0%;"></div>
        </div>
        <div class="status-text" id="statusText">等待开始...</div>
        <div class="threshold-hint" id="thresholdHint"> 阈值: 50 dB (最小) </div>
        <button class="mic-btn" id="micBtn">🎤 开启麦克风</button>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- ========== 高级模式 · 设置面板 ========== -->
    <div class="advanced-setup" id="advancedSetup">
        <button class="back-btn" id="btnBackSetup">← 返回选择</button>
        <h3 style="margin:8px 0; color:var(--text);">⚙️ 高级设置</h3>
        <div class="setting-group">
            <label>最低分贝 (dB)</label>
            <div class="slider-row">
                <input type="range" id="advMinDb" min="20" max="80" value="40" step="1">
                <span id="advMinDbVal">40 dB</span>
            </div>
        </div>
        <div class="setting-group">
            <label>最高分贝 (dB)</label>
            <div class="slider-row">
                <input type="range" id="advMaxDb" min="40" max="100" value="70" step="1">
                <span id="advMaxDbVal">70 dB</span>
            </div>
        </div>
        <div class="setting-group">
            <label>朗读时长 (分钟)</label>
            <div class="slider-row">
                <input type="range" id="advDuration" min="1" max="30" value="5" step="1">
                <span id="advDurationVal">5 分钟</span>
            </div>
        </div>
        <div class="setting-group">
            <label>动态图画主题</label>
            <div class="theme-selector" id="themeSelector">
                <div class="theme-btn active" data-theme="tree">🌳 树生长</div>
                <div class="theme-btn" data-theme="circle">🔵 呼吸圆</div>
                <div class="theme-btn" data-theme="bars">📊 跳动的柱</div>
            </div>
        </div>
        <button class="setup-start-btn" id="btnStartAdvanced">▶ 开始测试</button>
    </div>

    <!-- ========== 高级模式 · 播放视图 ========== -->
    <div class="advanced-play" id="advancedPlay">
        <button class="back-btn" id="btnBackPlay">← 返回设置</button>
        <span class="mode-tag advanced">高级模式</span>
        <div class="timer-info">
            <span>当前分贝</span>
            <span>剩余时间</span>
        </div>
        <div class="timer-info" style="margin-bottom:4px;">
            <span id="advCurrentDb" style="font-weight:700;">-- dB</span>
            <span class="timer-big" id="advTimerDisplay">05:00</span>
        </div>
        <div class="canvas-wrap" id="canvasWrap">
            <canvas id="playCanvas"></canvas>
        </div>
        <div class="controls-row">
            <button class="control-btn" id="btnPauseResume">⏯️ 暂停</button>
            <button class="control-btn" id="btnStopAdvanced">⏹️ 结束</button>
        </div>
        <div id="advStatus" style="font-size:0.8rem; margin-top:6px; color:var(--sub);"></div>
    </div>
</div>

<script>
    (function() {
        // ========== DOM 元素 ==========
        const headerView = document.getElementById('headerView');
        const modeCards = document.getElementById('modeCards');
        // 早读/自习面板
        const meterPanel = document.getElementById('meterPanel');
        const modeTag = document.getElementById('modeTag');
        const dbValueEl = document.getElementById('dbValue');
        const meterFill = document.getElementById('meterFill');
        const statusText = document.getElementById('statusText');
        const thresholdHint = document.getElementById('thresholdHint');
        const micBtn = document.getElementById('micBtn');
        const errorMsg = document.getElementById('errorMsg');
        const btnBackMeter = document.getElementById('btnBackMeter');
        // 高级设置面板
        const advancedSetup = document.getElementById('advancedSetup');
        const btnBackSetup = document.getElementById('btnBackSetup');
        const advMinDb = document.getElementById('advMinDb');
        const advMaxDb = document.getElementById('advMaxDb');
        const advDuration = document.getElementById('advDuration');
        const advMinDbVal = document.getElementById('advMinDbVal');
        const advMaxDbVal = document.getElementById('advMaxDbVal');
        const advDurationVal = document.getElementById('advDurationVal');
        const btnStartAdvanced = document.getElementById('btnStartAdvanced');
        const themeBtns = document.querySelectorAll('.theme-btn');
        // 高级播放视图
        const advancedPlay = document.getElementById('advancedPlay');
        const btnBackPlay = document.getElementById('btnBackPlay');
        const advCurrentDb = document.getElementById('advCurrentDb');
        const advTimerDisplay = document.getElementById('advTimerDisplay');
        const playCanvas = document.getElementById('playCanvas');
        const btnPauseResume = document.getElementById('btnPauseResume');
        const btnStopAdvanced = document.getElementById('btnStopAdvanced');
        const advStatus = document.getElementById('advStatus');

        // ========== 全局状态 ==========
        let currentMode = 'morning';       // 用于早读/自习面板
        let audioContext = null;
        let analyser = null;
        let microphoneStream = null;
        let isMicActive = false;
        let animFrame = null;
        let currentDb = 0;                // 全局当前分贝值

        // 高级模式专用状态
        let advancedConfig = {
            minDb: 40,
            maxDb: 70,
            durationMin: 5,
            theme: 'tree'
        };
        let advancedTimerInterval = null;
        let advancedSecondsLeft = 300;   // 5分钟默认
        let advancedIsPaused = false;
        let advancedActive = false;

        // ========== 早读/自习 函数 ==========
        const MODES = {
            morning: { name: '早读模式', tagClass: 'morning', minDb: 50, maxDb: 70, hint: '阈值: 50 dB (最小) · 建议大声朗读' },
            study: { name: '自习模式', tagClass: 'study', minDb: 30, maxDb: 50, hint: '阈值: 30 dB (最大) · 保持安静自习' }
        };

        function setMeterMode(mode) {
            currentMode = mode;
            const cfg = MODES[mode];
            modeTag.textContent = cfg.name;
            modeTag.className = 'mode-tag ' + cfg.tagClass;
            thresholdHint.textContent = cfg.hint;
            dbValueEl.textContent = '--';
            meterFill.style.width = '0%';
            statusText.textContent = '等待开始...';
        }

        function calculateDecibels(dataArray) {
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i] * dataArray[i];
            const rms = Math.sqrt(sum / dataArray.length);
            if (rms <= 0) return 0;
            const ref = 128;
            let db = 20 * Math.log10(rms / ref);
            db = Math.max(0, (db + 100) * 0.8);
            return Math.round(db);
        }

        function updateMeter() {
            if (!analyser || !isMicActive) return;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            const db = calculateDecibels(dataArray);
            currentDb = db;
            dbValueEl.textContent = db;
            const cfg = MODES[currentMode];
            let percent = 0;
            if (currentMode === 'morning') percent = Math.min(100, Math.max(0, (db - 30) / 50 * 100));
            else percent = Math.min(100, Math.max(0, (db - 20) / 50 * 100));
            meterFill.style.width = percent + '%';
            meterFill.style.background = percent > 70 ? '#d4a853' : '#8ca390';
            if (db < cfg.minDb) statusText.textContent = currentMode === 'morning' ? '🔇 再大声一点…' : '✅ 非常安静';
            else if (currentMode === 'study' && db > cfg.maxDb) statusText.textContent = '⚠️ 太吵了，保持安静';
            else if (currentMode === 'morning' && db >= cfg.minDb && db <= cfg.maxDb) statusText.textContent = '👍 朗读音量合适';
            else if (currentMode === 'morning' && db > cfg.maxDb) statusText.textContent = '📢 声音很大！';
            else statusText.textContent = '···';
            animFrame = requestAnimationFrame(updateMeter);
        }

        async function enableMicrophone() {
            if (isMicActive) return;
            try {
                errorMsg.textContent = '';
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                microphoneStream = stream;
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                await audioContext.resume();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                isMicActive = true;
                micBtn.textContent = '🎤 麦克风已开启';
                micBtn.classList.add('off');
                updateMeter();
            } catch (err) {
                errorMsg.textContent = '麦克风权限被拒绝或设备不可用，请在HTTPS/localhost下打开。';
                micBtn.textContent = '🎤 重试开启';
                isMicActive = false;
            }
        }

        function disableMicrophone() {
            if (microphoneStream) {
                microphoneStream.getTracks().forEach(track => track.stop());
                microphoneStream = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            analyser = null;
            if (animFrame) cancelAnimationFrame(animFrame);
            isMicActive = false;
            micBtn.textContent = '🎤 开启麦克风';
            micBtn.classList.remove('off');
            dbValueEl.textContent = '--';
            meterFill.style.width = '0%';
            statusText.textContent = '等待开始...';
        }

        function showMeter(mode) {
            setMeterMode(mode);
            hideAllPanels();
            meterPanel.classList.add('active');
            if (isMicActive) disableMicrophone();
        }

        // ========== 高级模式 · 设置 ==========
        function updateAdvancedSliders() {
            advMinDbVal.textContent = advMinDb.value + ' dB';
            advMaxDbVal.textContent = advMaxDb.value + ' dB';
            advDurationVal.textContent = advDuration.value + ' 分钟';
            // 确保最小值小于最大值
            if (parseInt(advMinDb.value) >= parseInt(advMaxDb.value)) {
                advMaxDb.value = parseInt(advMinDb.value) + 1;
                advMaxDbVal.textContent = advMaxDb.value + ' dB';
            }
        }

        advMinDb.addEventListener('input', updateAdvancedSliders);
        advMaxDb.addEventListener('input', updateAdvancedSliders);
        advDuration.addEventListener('input', updateAdvancedSliders);

        // 主题选择
        themeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                themeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                advancedConfig.theme = btn.dataset.theme;
            });
        });

        function showAdvancedSetup() {
            hideAllPanels();
            advancedSetup.classList.add('active');
            updateAdvancedSliders();
        }

        // ========== 高级模式 · 播放视图（含 Canvas 动画） ==========
        let canvasCtx = null;
        let canvasAnimFrame = null;

        function drawTree(db) {
            if (!canvasCtx) return;
            const canvas = playCanvas;
            const ctx = canvasCtx;
            const w = canvas.width;
            const h = canvas.height;
            ctx.clearRect(0, 0, w, h);

            // 声音映射到树的大小 (0.3 ~ 1.5倍)
            const minDb = advancedConfig.minDb;
            const maxDb = advancedConfig.maxDb;
            let scale = 0.3;
            if (db >= maxDb) scale = 1.3;
            else if (db <= minDb) scale = 0.3;
            else scale = 0.3 + (db - minDb) / (maxDb - minDb) * 0.9;

            const baseX = w/2;
            const baseY = h - 20;
            const trunkHeight = 60 * scale;
            const trunkWidth = 8 * scale;
            const crownRadius = 35 * scale;

            // 树干
            ctx.fillStyle = '#8B5A2B';
            ctx.fillRect(baseX - trunkWidth/2, baseY - trunkHeight, trunkWidth, trunkHeight);
            // 树冠 (三层圆)
            ctx.fillStyle = '#2E8B57';
            ctx.beginPath();
            ctx.arc(baseX, baseY - trunkHeight - crownRadius*0.5, crownRadius, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(baseX - crownRadius*0.6, baseY - trunkHeight - crownRadius*0.1, crownRadius*0.8, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(baseX + crownRadius*0.6, baseY - trunkHeight - crownRadius*0.1, crownRadius*0.8, 0, Math.PI*2);
            ctx.fill();
        }

        function drawCircle(db) {
            if (!canvasCtx) return;
            const ctx = canvasCtx;
            const w = playCanvas.width;
            const h = playCanvas.height;
            ctx.clearRect(0, 0, w, h);

            const minDb = advancedConfig.minDb;
            const maxDb = advancedConfig.maxDb;
            let radius = 20;
            if (db >= maxDb) radius = 90;
            else if (db <= minDb) radius = 20;
            else radius = 20 + (db - minDb) / (maxDb - minDb) * 70;

            ctx.fillStyle = '#7b9e87';
            ctx.beginPath();
            ctx.arc(w/2, h/2, radius, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#e8b86d';
            ctx.beginPath();
            ctx.arc(w/2, h/2, radius*0.6, 0, Math.PI*2);
            ctx.fill();
        }

        function drawBars(db) {
            if (!canvasCtx) return;
            const ctx = canvasCtx;
            const w = playCanvas.width;
            const h = playCanvas.height;
            ctx.clearRect(0, 0, w, h);
            const minDb = advancedConfig.minDb;
            const maxDb = advancedConfig.maxDb;
            let intensity = 0;
            if (db >= maxDb) intensity = 1;
            else if (db <= minDb) intensity = 0.1;
            else intensity = 0.1 + (db - minDb) / (maxDb - minDb) * 0.9;

            const barCount = 12;
            const barWidth = w / barCount - 4;
            for (let i = 0; i < barCount; i++) {
                const barHeight = 10 + Math.sin(i * 0.8 + db * 0.1) * 20 + intensity * 50;
                ctx.fillStyle = `hsl(${i * 30}, 60%, 60%)`;
                ctx.fillRect(i * (barWidth+4) + 2, h - barHeight, barWidth, barHeight);
            }
        }

        function renderCanvas() {
            if (!advancedActive || advancedIsPaused) {
                canvasAnimFrame = requestAnimationFrame(renderCanvas);
                return;
            }
            // 读取当前分贝
            if (analyser && isMicActive) {
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(dataArray);
                currentDb = calculateDecibels(dataArray);
                advCurrentDb.textContent = currentDb + ' dB';
            } else {
                advCurrentDb.textContent = '-- dB';
            }

            // 根据主题绘制
            switch (advancedConfig.theme) {
                case 'tree': drawTree(currentDb); break;
                case 'circle': drawCircle(currentDb); break;
                case 'bars': drawBars(currentDb); break;
                default: drawTree(currentDb);
            }
            canvasAnimFrame = requestAnimationFrame(renderCanvas);
        }

        function initCanvas() {
            if (!playCanvas) return;
            playCanvas.width = playCanvas.offsetWidth * 2;
            playCanvas.height = playCanvas.offsetHeight * 2;
            canvasCtx = playCanvas.getContext('2d');
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        }

        function updateAdvancedTimer() {
            if (advancedIsPaused || !advancedActive) return;
            if (advancedSecondsLeft > 0) {
                advancedSecondsLeft--;
                advTimerDisplay.textContent = formatTime(advancedSecondsLeft);
            }
            if (advancedSecondsLeft <= 0) {
                stopAdvancedTest();
                advStatus.textContent = '⏰ 时间到！朗读结束。';
                if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
            }
        }

        function startAdvancedTimer() {
            if (advancedTimerInterval) clearInterval(advancedTimerInterval);
            advancedTimerInterval = setInterval(updateAdvancedTimer, 1000);
        }

        function stopAdvancedTest() {
            if (advancedTimerInterval) clearInterval(advancedTimerInterval);
            advancedActive = false;
            if (canvasAnimFrame) cancelAnimationFrame(canvasAnimFrame);
            btnPauseResume.textContent = '⏯️ 暂停';
            advancedIsPaused = false;
        }

        function showAdvancedPlay() {
            hideAllPanels();
            // 读取设置
            advancedConfig.minDb = parseInt(advMinDb.value);
            advancedConfig.maxDb = parseInt(advMaxDb.value);
            advancedConfig.durationMin = parseInt(advDuration.value);
            advancedSecondsLeft = advancedConfig.durationMin * 60;
            advTimerDisplay.textContent = formatTime(advancedSecondsLeft);
            advCurrentDb.textContent = '-- dB';
            advStatus.textContent = '';
            advancedActive = true;
            advancedIsPaused = false;
            btnPauseResume.textContent = '⏯️ 暂停';

            advancedPlay.classList.add('active');
            initCanvas();
            // 如果麦克风未开启，自动开启
            if (!isMicActive) {
                enableMicrophone().then(() => {
                    startAdvancedTimer();
                    renderCanvas();
                });
            } else {
                startAdvancedTimer();
                renderCanvas();
            }
        }

        // 暂停/继续
        btnPauseResume.addEventListener('click', () => {
            if (!advancedActive) return;
            advancedIsPaused = !advancedIsPaused;
            btnPauseResume.textContent = advancedIsPaused ? '▶ 继续' : '⏯️ 暂停';
        });

        btnStopAdvanced.addEventListener('click', () => {
            stopAdvancedTest();
            advStatus.textContent = '已手动结束';
            // 返回设置
            hideAllPanels();
            advancedSetup.classList.add('active');
        });

        btnBackPlay.addEventListener('click', () => {
            stopAdvancedTest();
            hideAllPanels();
            advancedSetup.classList.add('active');
        });

        // ========== 面板切换通用 ==========
        function hideAllPanels() {
            meterPanel.classList.remove('active');
            advancedSetup.classList.remove('active');
            advancedPlay.classList.remove('active');
            headerView.classList.add('hidden');
            modeCards.classList.add('hidden');
        }

        function showCards() {
            disableMicrophone();
            stopAdvancedTest();
            hideAllPanels();
            headerView.classList.remove('hidden');
            modeCards.classList.remove('hidden');
        }

        // ========== 事件绑定 ==========
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', () => {
                const mode = card.dataset.mode;
                if (mode === 'morning' || mode === 'study') {
                    showMeter(mode);
                } else if (mode === 'advanced') {
                    showAdvancedSetup();
                }
            });
        });

        btnBackMeter.addEventListener('click', showCards);
        btnBackSetup.addEventListener('click', showCards);
        micBtn.addEventListener('click', () => {
            if (isMicActive) disableMicrophone();
            else enableMicrophone();
        });

        btnStartAdvanced.addEventListener('click', () => {
            showAdvancedPlay();
        });

        window.addEventListener('beforeunload', () => {
            disableMicrophone();
            stopAdvancedTest();
        });

        // 初始化滑块显示
        updateAdvancedSliders();
        console.log('✅ 分贝测试工具已就绪 | 早读/自习/高级模式');
    })();
</script>
</body>
</html>
